# Use Ctrl+A as the prefix key
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Scrollback buffer
set -g history-limit 50000

# Enable mouse
set-option -g mouse on

# Resize windows based on the smallest client actively viewing that window
set-option -g aggressive-resize on

# Start windows and panes at 2, not 0
set -g base-index 2
set -wg pane-base-index 2

# Focus-events for neovim
set -g focus-events on

# TERM
set -s default-terminal "tmux-256color"
set -as terminal-features ",*:RGB,xterm*:hyperlinks"

# Use Vim shortcuts
set -wg mode-keys vi

# use 'v' to begin selection like in vim
bind -T copy-mode-vi v send -X begin-selection

# use 'Y' to copy to system clipboard, 'y' and Enter still copies to tmux buffer
bind -T copy-mode-vi Y send -X copy-pipe "pbcopy"
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Make `Ctrl+A R` reload the config file
unbind r
bind r source-file ~/.tmux.conf
