# btop configuration — managed via dotfiles, do not edit at runtime
#
# Presets (cycle with 'p'):
#   0 = all boxes (default)
#   1 = cpu (bottom) + proc — tree focus: press 't' then 'e' for tree with aggregation
#   2 = cpu + mem + net (no proc)
#   3 = cpu (block) + net (tty)
#   4 = mem + net — IO focus: press 'd' for big disk IO graphs
#
# Useful keys: 't' toggle tree, 'e' toggle aggregate, 'd' toggle IO mode

color_theme = "Default"
theme_background = true
truecolor = true
force_tty = false

# Presets from vvartiainen + IO focus view
presets = "cpu:1:default,proc:0:default cpu:0:default,mem:0:default,net:0:default cpu:0:block,net:0:tty mem:0:default,net:0:default"

vim_keys = true
rounded_corners = true
terminal_sync = true
graph_symbol = "braille"
graph_symbol_cpu = "default"
graph_symbol_mem = "default"
graph_symbol_net = "default"
graph_symbol_proc = "default"

shown_boxes = "cpu mem net proc"
update_ms = 2000

# Process box — tree/aggregate off by default; toggle with 't'/'e' in tree preset
proc_sorting = "cpu lazy"
proc_reversed = false
proc_tree = false
proc_colors = true
proc_gradient = true
proc_per_core = false
proc_mem_bytes = true
proc_cpu_graphs = true
proc_info_smaps = false
proc_left = false
proc_filter_kernel = false
proc_aggregate = false

# CPU box
cpu_graph_upper = "Auto"
cpu_graph_lower = "Auto"
cpu_invert_lower = true
cpu_single_graph = false
cpu_bottom = false
show_uptime = false
show_cpu_watts = true
check_temp = true
cpu_sensor = "Auto"
show_coretemp = true
cpu_core_map = ""
temp_scale = "celsius"
base_10_sizes = false
show_cpu_freq = true

# Show system time and uptime in top bar (not in CPU box)
clock_format = "%X /uptime"

background_update = true
custom_cpu_name = ""

# Memory/Disk box — IO mode off by default; toggle with 'd' in IO preset
disks_filter = ""
mem_graphs = true
mem_below_net = false
zfs_arc_cached = true
show_swap = true
swap_disk = true
show_disks = true
only_physical = true
use_fstab = false
zfs_hide_datasets = false
disk_free_priv = false
show_io_stat = true
io_mode = false
io_graph_combined = false
io_graph_speeds = ""

# Network box
net_download = 100
net_upload = 100
net_auto = true
net_sync = true
net_iface = ""
base_10_bitrate = "Auto"

# Battery
show_battery = true
selected_battery = "Auto"
show_battery_watts = true

# Logging
log_level = "WARNING"

# Never overwrite this managed config on exit
save_config_on_exit = false
